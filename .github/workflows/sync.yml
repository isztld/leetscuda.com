name: Sync problems

on:
  push:
    branches: [main]
    paths:
      - 'problems/**/*.mdx'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @leetscuda/web db:sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
